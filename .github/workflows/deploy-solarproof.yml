name: Deploy SolarProof to voltfair-cli

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t solarproof-app:latest .

      - name: Transfer image to voltfair-cli
        run: |
          docker save solarproof-app:latest | gzip | ssh -o StrictHostKeyChecking=no root@46.225.107.118 'gunzip | docker load'

      - name: Deploy on voltfair-cli
        run: |
          ssh -o StrictHostKeyChecking=no root@46.225.107.118 'cd /opt/solarproof && docker compose up -d && docker image prune -f'

      - name: Cleanup local image
        run: docker rmi solarproof-app:latest 2>/dev/null || true

      - name: Health check
        run: |
          sleep 3
          ssh -o StrictHostKeyChecking=no root@46.225.107.118 'curl -sf http://localhost:$(docker port solarproof-app 80 | head -1 | cut -d: -f2)/ > /dev/null' && echo "SolarProof is healthy" || echo "Health check failed"
