name: Deploy SolarProof to voltfair-cli

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: [self-hosted, voltfair-cli]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t solarproof-app:latest .

      - name: Deploy
        run: |
          cp docker-compose.yml /opt/solarproof/docker-compose.yml
          cd /opt/solarproof && docker compose up -d --force-recreate && docker image prune -f

      - name: Health check
        run: |
          sleep 5
          docker inspect --format='{{.State.Health.Status}}' solarproof-app 2>/dev/null \
            || docker ps --filter name=solarproof-app --format '{{.Status}}'
